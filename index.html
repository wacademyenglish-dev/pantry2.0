<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | Homework App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bgDark: '#2C2925', panelDark: '#3A3631', panelHover: '#4D4741', textLight: '#F5F5F0', textMuted: '#A8A29E', accentSage: '#8BA888', accentBamboo: '#D4B886', dangerRed: '#E57373' },
                    fontFamily: { heading: ['Outfit', 'sans-serif'], body: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background: #1C1917; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        #phone-frame { width: 375px; height: 812px; background: #2C2925; border-radius: 40px; border: 12px solid #000; overflow: hidden; position: relative; box-shadow: 0 20px 60px rgba(139,168,136,0.15); }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 150px; height: 30px; background: #000; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 50; }
        .fade-in { animation: fadeIn 0.3s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        /* Confetti */
        .confetti { position: absolute; width: 8px; height: 8px; background-color: #8BA888; opacity: 0; }
        @keyframes fall { 0% { opacity: 1; transform: translateY(-50px) rotate(0deg); } 100% { opacity: 0; transform: translateY(800px) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="phone-frame">
        <div class="notch"></div>
        
        <!-- UI Header -->
        <header class="pt-12 pb-4 px-6 bg-panelDark border-b border-panelHover flex justify-between items-center z-40 relative">
            <div class="font-heading font-bold text-accentSage text-sm tracking-widest uppercase">WOLF<span class="text-textLight">HW</span></div>
            <div class="text-xs font-mono text-textMuted" id="q-counter">Q 1/10</div>
        </header>

        <!-- Progress Bar -->
        <div class="h-1 bg-bgDark w-full">
            <div id="progress-bar" class="h-full bg-accentSage transition-all duration-300 shadow-[0_0_8px_rgba(139,168,136,0.5)]" style="width: 0%"></div>
        </div>

        <!-- Main Content -->
        <main id="app-content" class="p-6 h-[calc(100%-100px)] overflow-y-auto relative text-textLight">
            <!-- Start Screen -->
            <div id="screen-start" class="flex flex-col items-center justify-center h-full text-center fade-in">
                <i class="fa-solid fa-bowl-rice text-7xl text-accentSage mb-6" style="text-shadow: 0 0 20px rgba(139,168,136,0.5);"></i>
                <h1 class="font-heading text-4xl font-light mb-2 uppercase tracking-widest">The Minimalist Pantry</h1>
                <p class="text-textMuted mb-10 text-sm">Homework Module A1<br>Some, Any, How much/many</p>
                <button onclick="startQuiz()" class="bg-accentSage/20 text-accentSage border border-accentSage w-full py-4 rounded-xl font-bold font-heading tracking-widest uppercase text-lg shadow-lg hover:bg-accentSage hover:text-bgDark transition-colors">START SESSION</button>
            </div>

            <!-- Quiz Screen -->
            <div id="screen-quiz" class="hidden flex-col h-full fade-in">
                <div class="flex-1 flex flex-col justify-center">
                    <p id="question-text" class="font-body text-2xl font-medium mb-8 text-center leading-snug"></p>
                    <div id="options-container" class="flex flex-col gap-4">
                        <!-- Options injected here -->
                    </div>
                </div>
            </div>

            <!-- Result Screen -->
            <div id="screen-result" class="hidden flex-col items-center justify-center h-full text-center fade-in z-10 relative">
                <div id="rank-icon" class="text-7xl mb-4 text-accentSage" style="text-shadow: 0 0 20px rgba(139,168,136,0.4);"></div>
                <h2 class="font-heading text-5xl font-light mb-2 text-textLight" id="final-score"></h2>
                <p class="text-textMuted font-mono mb-8 uppercase tracking-widest text-sm" id="rank-title"></p>
                <div class="bg-panelDark p-5 rounded-2xl w-full border border-panelHover mb-8 shadow-inner text-left">
                    <p class="text-sm text-textLight leading-relaxed"><span class="text-accentBamboo font-bold">Some:</span> Affirmative sentences (+).<br><span class="text-dangerRed font-bold">Any:</span> Negative (-) and Questions (?).<br><span class="text-accentSage font-bold">How much:</span> Uncountable (Water).<br><span class="text-textLight font-bold">How many:</span> Countable (Apples).</p>
                </div>
                <button onclick="location.reload()" class="bg-panelHover border border-textMuted text-textMuted w-full py-4 rounded-xl font-bold font-heading tracking-widest uppercase">RESTART SESSION</button>
            </div>
        </main>
    </div>

    <script>
        const questions = [
            { q: "I have _____ apples in the fridge.", o: ["any", "much", "some"], a: 2 },
            { q: "Do you have _____ milk?", o: ["some", "any", "many"], a: 1 },
            { q: "I don't need _____ meat. I am vegetarian.", o: ["any", "some", "many"], a: 0 },
            { q: "How _____ water do you drink every day?", o: ["many", "much", "some"], a: 1 },
            { q: "How _____ eggs are in the box?", o: ["many", "much", "any"], a: 0 },
            { q: "Rice is an _____ noun.", o: ["countable", "plural", "uncountable"], a: 2 },
            { q: "We have _____ cookies in the pantry.", o: ["some", "any", "much"], a: 0 },
            { q: "There aren't _____ bananas left.", o: ["some", "any", "much"], a: 1 },
            { q: "How _____ money do you have?", o: ["much", "many", "any"], a: 0 },
            { q: "I need to buy _____ cheese.", o: ["any", "many", "some"], a: 2 }
        ];

        let currentQ = 0;
        let score = 0;

        function startQuiz() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            document.getElementById('screen-quiz').style.display = 'flex';
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('q-counter').innerText = `Q ${currentQ + 1}/${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQ) / questions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.q;
            
            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';
            
            q.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'w-full bg-panelDark border border-panelHover text-left p-5 rounded-xl text-lg hover:border-accentSage transition-colors';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(idx, q.a, btn, optsContainer);
                optsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selected, correct, btn, container) {
            Array.from(container.children).forEach(b => b.disabled = true);
            
            if (selected === correct) {
                btn.classList.add('bg-accentSage', 'border-accentSage', 'text-bgDark', 'font-bold');
                score++;
            } else {
                btn.classList.add('bg-dangerRed', 'border-dangerRed', 'text-textLight');
                container.children[correct].classList.add('border-accentSage', 'text-accentSage');
            }

            setTimeout(() => {
                currentQ++;
                if (currentQ < questions.length) {
                    document.getElementById('screen-quiz').classList.remove('fade-in');
                    void document.getElementById('screen-quiz').offsetWidth; 
                    document.getElementById('screen-quiz').classList.add('fade-in');
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1200);
        }

        function showResults() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('screen-result').style.display = 'flex';
            document.getElementById('progress-bar').style.width = '100%';
            
            document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
            
            let rank, icon;
            if (score === 10) { rank = 'ZEN MASTER'; icon = '<i class="fa-solid fa-yin-yang"></i>'; spawnConfetti(); }
            else if (score >= 7) { rank = 'MINIMALIST'; icon = '<i class="fa-solid fa-leaf text-accentBamboo"></i>'; }
            else { rank = 'HOARDER'; icon = '<i class="fa-solid fa-box text-textMuted"></i>'; }
            
            document.getElementById('rank-title').innerText = rank;
            document.getElementById('rank-icon').innerHTML = icon;
        }

        function spawnConfetti() {
            const container = document.getElementById('screen-result');
            const colors = ['#8BA888', '#D4B886', '#F5F5F0'];
            for(let i=0; i<40; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + '%';
                conf.style.animation = `fall ${Math.random() * 2 + 1}s linear forwards`;
                conf.style.animationDelay = Math.random() * 2 + 's';
                conf.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                container.appendChild(conf);
            }
        }
    </script>
</body>
</html>
